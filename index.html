<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SupportZebra X Shopee Philippines</title>
<link rel="icon" type="image/png" href="logo.png">

<script src="knowledge.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:
    radial-gradient(circle at top left,#1b2735,#090a0f 50%);
    color:white;
    overflow-x:hidden;
}

body::before{
    content:'';
    position:fixed;
    width:600px;
    height:600px;
    background:#00ffc31f;
    filter:blur(120px);
    top:-250px;
    right:-150px;
    z-index:-1;
}

body::after{
    content:'';
    position:fixed;
    width:500px;
    height:500px;
    background:#0066ff1f;
    filter:blur(120px);
    bottom:-250px;
    left:-150px;
    z-index:-1;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:40px 20px 80px;
}

.header{
    text-align:center;
    margin-bottom:40px;
    animation:fadeDown 1s ease;
}

.header h1{
    font-size:48px;
    font-weight:800;
    background:linear-gradient(
    to right,
    #ff5b1f,
    #ff7a00,
    #ff9a1f
);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.header p{
    margin-top:10px;
    color:#9aa4b2;
    font-size:14px;
    letter-spacing:1px;
}

.search-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:30px;
}

.search-box{
    position:relative;
}

.search-box input{
    width:100%;
    padding:18px 20px;
    border:none;
    outline:none;
    border-radius:18px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    color:white;
    font-size:15px;
    border:1px solid rgba(255,255,255,.08);
    transition:.3s;
}

.search-box input:focus{
    border:1px solid #00ffd0;
    box-shadow:0 0 25px rgba(0,255,208,.2);
}

.search-box input::placeholder{
    color:#9aa4b2;
}

.dropdown{
    position:absolute;
    width:100%;
    background:#111827;
    border-radius:14px;
    overflow:hidden;
    margin-top:8px;
    display:none;
    max-height:320px;
    overflow-y:auto;
    z-index:100;
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 15px 40px rgba(0,0,0,.5);
}

.dropdown-item{
    padding:14px 16px;
    cursor:pointer;
    transition:.2s;
    border-bottom:1px solid rgba(255,255,255,.05);
}

.dropdown-item:hover{
    background:#1f2937;
}

.results{
    display:flex;
    flex-direction:column;
    gap:25px;
}

.card{
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(20px);
    border-radius:24px;
    padding:28px;
    border:1px solid rgba(255,255,255,.06);
    animation:fadeUp .5s ease;
    position:relative;
    overflow:hidden;
}

.card::before{
    content:'';
    position:absolute;
    width:250px;
    height:250px;
    background:rgba(0,255,208,.08);
    border-radius:50%;
    top:-120px;
    right:-120px;
}

.category-title{
    font-size:24px;
    font-weight:700;
    margin-bottom:20px;

    background:linear-gradient(
        to right,
        #ff5b1f,
        #ff7a00,
        #ff9a1f
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
    0 0 18px rgba(255,122,0,.18);
}

.content{
    white-space:normal;
    line-height:1.8;
    color:#d8dee9;
    font-size:14px;
    margin-top:0;
    padding-top:0;
}

.content-block{
    margin-bottom:12px;
    line-height:1.7;
}

.copy-btn{
    margin-top:25px;
    border:none;
    background:linear-gradient(135deg,#00ffd0,#0077ff);
    color:white;
    padding:14px 22px;
    border-radius:14px;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
}

.copy-btn:hover{
    transform:translateY(-2px) scale(1.03);
}

.link{
    color:#4db8ff;
    text-decoration:none;
    word-break:break-all;
}

.link:hover{
    text-decoration:underline;
}

.section-tag{
    display:inline-block;
    background:#00ffd020;
    color:#00ffd0;
    padding:6px 12px;
    border-radius:999px;
    margin-bottom:18px;
    font-size:12px;
    font-weight:600;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes fadeDown{
    from{
        opacity:0;
        transform:translateY(-20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:900px){

    .search-grid{
        grid-template-columns:1fr;
    }

    .header h1{
        font-size:32px;
    }

}

.highlight-pop{
    animation:popHighlight 1.5s ease 3;
}

@keyframes popHighlight{

    0%{
        transform:scale(1);
        box-shadow:0 0 0 rgba(0,255,208,0);
        border-color:rgba(255,255,255,.06);
    }

    50%{
        transform:scale(1.025);
        box-shadow:
        0 0 35px rgba(0,255,208,.55),
        0 0 80px rgba(0,119,255,.25);
        border-color:#00ffd0;
    }

    100%{
        transform:scale(1);
        box-shadow:0 0 0 rgba(0,255,208,0);
        border-color:rgba(255,255,255,.06);
    }

}

.top-sticky{
    position:sticky;
    top:0;
    z-index:999;
    padding-top:20px;
    padding-bottom:20px;
    backdrop-filter:blur(18px);
    border-bottom:1px solid rgba(255,255,255,.06);
}

.faq-table-wrap{
    overflow-x:auto;
    margin-top:10px;
}

.faq-table{
    width:100%;
    border-collapse:collapse;
    border-radius:16px;
    overflow:hidden;
    background:rgba(255,255,255,.03);

    table-layout:fixed;
}

.faq-table th{
    background:rgba(0,255,208,.12);
    color:#00ffd0;
    text-align:left;
    padding:14px;
    font-size:14px;
}

.faq-table td{
    padding:14px;
    border-top:1px solid rgba(255,255,255,.05);
    font-size:14px;
    color:#d8dee9;
}

.faq-table tr:hover{
    background:rgba(255,255,255,.03);
}

.faq-table td{
    vertical-align:middle;
}

.faq-link-cell{
    width:38%;
    word-break:break-word;
    overflow-wrap:break-word;
    line-height:1.5;
}

.faq-label{
    width:62%;
}

.sub-category{
    color:#8fa3b8;
    font-size:13px;
    margin-top:18px;
    margin-bottom:10px;
    font-weight:600;
    letter-spacing:.4px;
}

.spiel-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.spiel-list{
    margin-bottom:14px;
}

.spiel-item{
    display:flex;
    align-items:flex-start;
    gap:12px;
    margin-bottom:2px;
}

.mini-copy-btn{
    border:none;
    background:linear-gradient(
        135deg,
        #ff5b1f,
        #ff7a00
    );

    color:white;
    padding:6px 12px;
    border-radius:10px;
    cursor:pointer;
    font-size:12px;
    font-weight:700;
    flex-shrink:0;

    transition:.2s;
}

.mini-copy-btn:hover{
    transform:scale(1.05);
}

.spiel-text{
    flex:1;
    line-height:1.7;
}

.search-highlight{
    background:#ffe066;
    color:#000 !important;

    padding:2px 6px;

    border-radius:6px;

    font-weight:800;

    box-shadow:
    0 0 10px rgba(255,224,102,.65);

    display:inline-block;
}


</style>
</head>

<body>

<div class="container">

<div class="top-sticky">

    <div class="header">
        <h1>SupportZebra X Shopee Philippines</h1>
        <p>Guides, Links and Suggested Spiels by MICHELLE TAPARAN</p>
        <p>BUYER LOGISTICS and RETURN/REFUND</p>
    </div>

    <div class="search-grid">

        <div class="search-box">
            <input type="text" id="categorySearch" placeholder="Search Categories...">
            <div class="dropdown" id="categoryDropdown"></div>
        </div>

        <div class="search-box">
            <input type="text" id="keywordSearch" placeholder="Search Overall Keywords...">
            <div class="dropdown" id="keywordDropdown"></div>
        </div>

    </div>
    </div>

    <div class="results" id="results"></div>

</div>

<script>

const rawData = knowledgeBase;

function parseSections(text){

    const sections = [];

    const blocks = text
        .split(/\n\s*\n/)
        .map(x=>x.trim())
        .filter(x=>x.length > 0);

    blocks.forEach((block,index)=>{

        const lines = block
            .split('\n')
            .map(x=>x.trim())
            .filter(x=>x);

        const title = lines[0] || `Category ${index+1}`;

        const subSections = [];

        let currentSub = null;

        for(let i=1;i<lines.length;i++){

            const line = lines[i];

const isSubCategory =

    line.startsWith('*')

    ||

    line.toLowerCase().includes('suggested spiel:')

    ||

    line.toLowerCase().includes('guide:')

    ||

    line.toLowerCase().includes('faq links')

    ||

    line.toLowerCase().includes('for expedite')

    ||

    line.toLowerCase().includes('task creation')

    ||

    line.toLowerCase().includes('run macro:')

    ||

    line.toLowerCase().includes('cx ask')

    ||

    line.toLowerCase().includes('how to')

    ||

    line.toLowerCase().includes('request to');

if(isSubCategory){

    if(currentSub){
        subSections.push(currentSub);
    }

    currentSub = {

        title:line.replace('*','').trim(),

        content:[]

    };

}else{

    // auto-create default subsection
    // for old knowledge.js format
    if(!currentSub){

        currentSub = {

            title:'Information',

            content:[]

        };

    }

    currentSub.content.push(line);

}
}
       



        if(currentSub){
            subSections.push(currentSub);
        }

        sections.push({

            id:index,
            title,
            subSections,

            search:(
                title + ' ' +
                JSON.stringify(subSections)
            ).toLowerCase()

        });

    });

    return sections;
}

const sections = parseSections(rawData);

const results = document.getElementById('results');

function renderAll(){

    results.innerHTML = '';

    sections.forEach(section=>{
        renderCard(section);
    });

}

function convertLinks(text, title=''){

    const lines = text
        .split('\n')
        .map(x=>x.trim())
        .filter(x=>x);

    const faqLines = lines.filter(line =>
        line.includes('http')
    );

    if(
        title.toUpperCase().includes('FAQ LINKS')
        && faqLines.length >= 3
    ){

        let tableRows = '';

        faqLines.forEach(line=>{

            const match = line.match(/\(?\s*(https?:\/\/[^\s\)]+)\s*\)?/);

            if(match){

                const url = match[0];

const label = line
    .replace(/\(?\s*https?:\/\/[^\s\)]+\s*\)?/,'')
    .trim();

                tableRows += `
                    <tr>

                        <td class="faq-label">
                            ${label}
                        </td>

                        <td class="faq-link-cell">

<a class="link"
href="${url}"
target="_blank">

    ${url}

</a>

                        </td>

                    </tr>
                `;
            }

        });

        return `

            <div class="faq-table-wrap">

                <table class="faq-table">

                    <thead>

                        <tr>
                            <th>Description</th>
                            <th>Link</th>
                        </tr>

                    </thead>

                    <tbody>

                        ${tableRows}

                    </tbody>

                </table>

            </div>

        `;
    }

    const urlRegex = /(https?:\/\/[^\s]+)/g;

    text = text.replace(urlRegex,url=>{
        return `|||LINK|||${url}|||ENDLINK|||`;
    });

text = text

    // normalize large empty spaces
    .replace(/\n{3,}/g,'\n\n')

    // bullets always start on new line
    .replace(/\s*•\s*/g,'<br>• ')

    // convert line breaks
    .replace(/\n(?!•)/g,'<br>');

    text = text.replace(
        /\|\|\|LINK\|\|\|(.*?)\|\|\|ENDLINK\|\|\|/g,
        (match,url)=>{
            return `
                <a class="link"
                href="${url}"
                target="_blank">

                ${url}

                </a>
            `;
        }
    );

    return text;
}

function renderCard(section){

    const div = document.createElement('div');

    div.className = 'card';
    div.id = 'section-' + section.id;

    div.innerHTML = `

        <div class="section-tag">CATEGORY</div>

        <div class="category-title">
            ${section.title}
        </div>

        <div class="content">

            ${section.subSections.map(sub=>{

const isSuggestedSpiel =
    /suggested\s*spiel/i.test(sub.title);

const bulletItems = sub.content
    .join('\n')

    // normalize bullets
    .replace(/[••●▪◦]/g,'|||BULLET|||')

    .split('|||BULLET|||')

    .map(x=>x.trim())

    .filter(x=>x);

                return `

                    <div class="sub-category">

                        ${highlightText(sub.title)}

                    </div>

                    ${isSuggestedSpiel && bulletItems.length ? `

                        <div class="spiel-list">

                            ${bulletItems.map(item=>`

                                <div class="spiel-item">

                                    <button
                                    class="mini-copy-btn"
                                    onclick="copyBullet(this, \`${item.replace(/`/g,'\\`')}\`)">

                                        Copy

                                    </button>

                                    <div class="spiel-text">
                                        • ${highlightText(
    convertLinks(item, section.title)
)}
                                    </div>

                                </div>

                            `).join('')}

                        </div>

                    ` : `

                        <div class="content-block">

${highlightText(
    convertLinks(
        sub.content.join('\n'),
        section.title
    )
)}

                        </div>

                    `}

                `;

            }).join('')}

        </div>

    `;

    results.appendChild(div);

}


function copyText(id){

    const section = sections.find(x=>x.id===id);

const cleanedContent = section.content
    .replace(section.title,'')
    .replace(/^\s+/,'')
    .trim();

    navigator.clipboard.writeText(cleanedContent);

    const btn = event.target;

    btn.innerText = 'Copied ✓';

    setTimeout(()=>{
        btn.innerText = 'Copy Content';
    },1500);

}

function copyBullet(btn, text){

    navigator.clipboard.writeText(text);

    const original = btn.innerText;

    btn.innerText = 'Copied ✓';

    setTimeout(()=>{
        btn.innerText = original;
    },1500);

}

function setupSearch(inputId, dropdownId, type){

    const input = document.getElementById(inputId);
    const dropdown = document.getElementById(dropdownId);

function renderDropdown(){

    const value = input.value.trim().toLowerCase();

    dropdown.innerHTML = '';

    if(value.length < 3){
        dropdown.style.display = 'none';
        return;
    }

    let matched = sections.filter(section=>{

        if(type === 'category'){
            return (
    section.title.toLowerCase().includes(value)
    ||
    section.subSections.some(sub =>
        sub.title.toLowerCase().includes(value)
    )
);
        }else{
            return section.search.includes(value);
        }

    });

    if(!matched.length){
        dropdown.style.display = 'none';
        return;
    }

    matched.slice(0,15).forEach(section=>{

        const item = document.createElement('div');

        item.className = 'dropdown-item';

const regex = new RegExp(
    `(${value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`,
    'ig'
);

let displayText = section.title;

if(type === 'keyword'){

    const matchedSub = section.subSections.find(sub=>

        sub.content
        .join(' ')
        .toLowerCase()
        .includes(value)

    );

    if(matchedSub){

        const combinedText = matchedSub.content.join(' ');

        const index = combinedText
            .toLowerCase()
            .indexOf(value);

        if(index >= 0){

            const snippet = combinedText.substring(
                Math.max(0,index - 30),
                index + value.length + 50
            );

            displayText = `
                ${highlightText(section.title)}
                <div style="
                    margin-top:6px;
                    font-size:12px;
                    color:#9aa4b2;
                    line-height:1.5;
                ">
                    ...${snippet.replace(
                        regex,
                        '<span class="search-highlight">$1</span>'
                    )}...
                </div>
            `;
        }
    }

}else{

    displayText = section.title.replace(
        regex,
        '<span class="search-highlight">$1</span>'
    );

}

item.innerHTML = displayText;

        item.onclick = ()=>{

            dropdown.style.display = 'none';

            const target = document.getElementById(
                'section-' + section.id
            );

            target.scrollIntoView({
                behavior:'smooth',
                block:'center'
            });

            target.classList.remove('highlight-pop');

            void target.offsetWidth;

            target.classList.add('highlight-pop');

        };

        dropdown.appendChild(item);

    });

    dropdown.style.display = 'block';

}

input.addEventListener('input',()=>{

    renderDropdown();

    renderAll();

});

input.addEventListener('focus',()=>{

    if(input.value.trim().length >= 3){
        renderDropdown();
    }

});

    document.addEventListener('click',(e)=>{

        if(!input.contains(e.target) &&
           !dropdown.contains(e.target)){

            dropdown.style.display = 'none';

        }

    });

}

setupSearch(
    'categorySearch',
    'categoryDropdown',
    'category'
);

setupSearch(
    'keywordSearch',
    'keywordDropdown',
    'keyword'
);

function highlightText(text){

const keywordInput =
    document.activeElement?.id === 'categorySearch'

    ? document.getElementById('categorySearch')

    : document.getElementById('keywordSearch');

    if(!keywordInput) return text;

    const keyword = keywordInput.value.trim();

    if(keyword.length < 3) return text;

    const escaped = keyword.replace(
        /[.*+?^${}()|[\]\\]/g,
        '\\$&'
    );

    const regex = new RegExp(`(${escaped})`,'ig');

    return text.replace(
        regex,
        '<span class="search-highlight">$1</span>'
    );

}

renderAll();

</script>

</body>
</html>
